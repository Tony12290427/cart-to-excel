<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cart to Order Form</title>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; color: #333; padding: 20px; }
.container { max-width: 1200px; margin: 0 auto; }
h1 { font-size: 1.5rem; margin-bottom: 20px; color: #1a1a1a; }
.paste-zone {
  background: #fff; border: 2px dashed #ccc; border-radius: 8px;
  padding: 60px 20px; text-align: center; cursor: pointer; transition: all .2s;
}
.paste-zone:hover { border-color: #4a90d9; background: #fafbff; }
.paste-zone.active { border-color: #4a90d9; background: #e8f0fe; }
.paste-zone textarea {
  width: 100%; min-height: 200px; border: none; outline: none;
  resize: vertical; font-size: 14px; line-height: 1.6; padding: 20px;
}
.paste-zone .hint { color: #999; font-size: 14px; margin-top: 10px; }
.result-bar {
  background: #e8f5e9; padding: 12px 20px; border-radius: 6px;
  margin-top: 15px; display: flex; justify-content: space-between; align-items: center;
}
.result-bar .count { font-weight: 600; color: #2e7d32; }
.result-bar button {
  background: #fff; border: 1px solid #ccc; padding: 6px 16px;
  border-radius: 4px; cursor: pointer; font-size: 14px;
}
.edit-table { width: 100%; border-collapse: collapse; margin: 20px 0; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 3px rgba(0,0,0,.1); }
.edit-table th { background: #fff9c4; padding: 10px 8px; font-size: 12px; text-align: left; border-bottom: 2px solid #e0e0e0; color: #555; }
.edit-table td { padding: 6px 8px; border-bottom: 1px solid #f0f0f0; font-size: 13px; }
.edit-table input, .edit-table select { width: 100%; padding: 4px 6px; border: 1px solid #ddd; border-radius: 3px; font-size: 13px; }
.edit-table input:focus, .edit-table select:focus { outline: none; border-color: #4a90d9; }
.edit-table .low-confidence { border-color: #ff9800; background: #fff8e1; }
.edit-table .col-num { width: 40px; text-align: center; }
.edit-table .col-name { min-width: 300px; }
.edit-table .col-qty { width: 60px; }
.edit-table .col-price { width: 80px; }
.edit-table .col-type { width: 200px; }
.edit-table .col-link { width: 200px; }
.edit-table .col-del { width: 40px; text-align: center; }
.edit-table .btn-del {
  background: none; border: none; color: #c62828; cursor: pointer; font-size: 16px;
}
.summary-bar {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 20px; background: #fff; border-radius: 8px; box-shadow: 0 1px 3px rgba(0,0,0,.1);
}
@media (max-width: 768px) {
  body { padding: 10px; }
  .edit-table { font-size: 12px; }
  .edit-table th, .edit-table td { padding: 4px; }
  .col-name { min-width: 180px; }
  .col-type { width: 150px; }
  .col-link { width: 120px; }
}
</style>
</head>
<body>
<div class="container">
  <h1>HKUST Robotics Team - Order Form Generator</h1>
  <div style="display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap;">
    <div style="flex: 1; min-width: 200px;">
      <label style="font-size: 13px; color: #666;">Competition</label>
      <input id="input-competition" type="text" placeholder="e.g. MATE ROV 2026" style="width: 100%; padding: 8px 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px;">
    </div>
    <div style="flex: 1; min-width: 200px;">
      <label style="font-size: 13px; color: #666;">Name of Student</label>
      <input id="input-student" type="text" placeholder="e.g. Chan Tai Man" style="width: 100%; padding: 8px 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px;">
    </div>
  </div>
  <div id="paste-area">
    <div class="paste-zone" id="paste-zone">
      <div class="hint">📋 Ctrl+V 粘贴淘宝购物车内容到这里</div>
      <textarea id="paste-input" placeholder="在这里粘贴..."></textarea>
    </div>
    <div id="result-bar" class="result-bar" style="display:none;"></div>
  </div>
  <div id="editor-area" style="display:none;">
    <div id="table-container"></div>
    <div id="summary-bar" class="summary-bar"></div>
  </div>
  <div id="output-area" style="display:none; margin-top: 15px; text-align: right;">
  <button id="btn-restart" style="background: #fff; border: 1px solid #ccc; padding: 8px 16px; border-radius: 4px; cursor: pointer;">重新开始</button>
</div>
</div>
<script>
// === PARSER ===

const CATEGORY_RULES = [
  { pattern: /电机|motor|ESC|舵机/i, category: "EE_Motor/ESC related" },
  { pattern: /传感器|测距|TOF|超声波|GPS|IMU|红外|避障/i, category: "EE_Electronic Sensor" },
  { pattern: /电池|锂电池|铅酸|电瓶|battery|蓄电池/i, category: "EE_Battery" },
  { pattern: /PCB|电路板|开发板/i, category: "EE_PCB" },
  { pattern: /电阻|电容|芯片| IC|元件|连接器/i, category: "EE_Components" },
  { pattern: /金属|铝|钢|螺丝|螺母|CNC|加工/i, category: "MECH_Metal parts/manufacture" },
  { pattern: /碳纤维|玻纤|fibre|fiber/i, category: "MECH_Fibre parts/manufacture" },
  { pattern: /气动|气缸|pneumatic/i, category: "MECH_Pneumatic related" },
  { pattern: /3D打印|PLA|ABS|打印件|3D 打印/i, category: "MECH_3D printing related" },
  { pattern: /轴承|齿轮|联轴器|弹簧|皮带|同步带/i, category: "MECH_Components" },
  { pattern: /PVC|面料|泡棉|胶带|薄膜|塑料|海绵|eva/i, category: "MECH_Miscellaneous" },
  { pattern: /MCU|STM32|ARM\b|单片机|DAPLink|仿真器|下载器/i, category: "SW_MCU related" },
  { pattern: /I2C|SPI|串口|传感器模块/i, category: "SW_Sensors" },
  { pattern: /SW_|软件|代码|SDK|程序/i, category: "SW_Miscellaneous" },
  { pattern: /道具|Props|装饰/i, category: "Props" },
];

function matchCategory(name, spec) {
  const combined = (name + ' ' + (spec || '')).toLowerCase();
  for (const rule of CATEGORY_RULES) {
    if (rule.pattern.test(combined)) return rule.category;
  }
  return "Others";
}

// Normalize cross-line price formatting from Taobao clipboard:
// "￥\n29\n.\n6" (4-line) and "￥\n25" (2-line). Apply 4-line first.
function preprocessPrice(text) {
  return text
    .replace(/￥\s*\n\s*(\d+)\s*\n\s*\.\s*\n\s*(\d+)/g, '¥$1.$2')
    .replace(/￥\s*\n\s*(\d+)/g, '¥$1');
}

function splitBlocks(text) {
  const lines = text.split('\n');
  const blocks = [];
  let current = [];
  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    const isShopLine = line.length >= 3 && line.length <= 14
      && /^\S/.test(line)
      && !/退货|退款|信用卡|支付|包邮|价保|假一赔/.test(line);
    const prevBlank = i === 0 || lines[i-1].trim() === '';
    const nextBlank = i === lines.length - 1 || lines[i+1].trim() === '';

    if (isShopLine && prevBlank && nextBlank && i >= 2 && lines.slice(i-2, i).every(l => l.trim() === '')) {
      if (current.length > 0) {
        blocks.push({ shop: current[0], text: current.slice(1).join('\n') });
      }
      current = [line];
    } else {
      current.push(line);
    }
  }
  if (current.length > 0) {
    if (current[0].length <= 14 && /^\S/.test(current[0]) && !/退货|退款|信用卡|支付|包邮|价保|假一赔/.test(current[0])) {
      blocks.push({ shop: current[0], text: current.slice(1).join('\n') });
    } else if (blocks.length > 0) {
      blocks[blocks.length - 1].text += '\n' + current.join('\n');
    }
  }
  return blocks;
}

function parseItemBlock(block) {
  const text = '\n' + block.text + '\n';
  const skipPattern = /退货|退款|价保|信用卡|假一赔|包邮|满\d+件|优惠后|极速退款|支付|运费险/;

  const lines = block.text.split('\n').filter(l => l.trim());
  const candidateNames = lines.filter(l => l.length > 10 && !skipPattern.test(l));
  const name = candidateNames.length > 0
    ? candidateNames.reduce((a, b) => a.length >= b.length ? a : b, '')
    : (lines.find(l => l.length > 10) || '');

  const specMatch = text.match(/(?:颜色分类|数据线|型号|规格|版本|套餐)[：:]\s*(.+)/);
  const spec = specMatch ? specMatch[1].trim() : '';

  const priceMatch = text.match(/[$￥¥]\s*(\d+\.?\d*)/);
  const price = priceMatch ? parseFloat(priceMatch[1]) : null;

  const qtyMatches = text.match(/(?:^|\n)\s*(\d{1,2})\s*(?:\n|$)/gm);
  const quantities = (qtyMatches || [])
    .map(s => parseInt(s.trim()))
    .filter(n => n >= 1 && n <= 99);
  const quantity = quantities.length > 0 ? quantities[quantities.length - 1] : 1;

  return { name: name.trim(), spec, price, quantity };
}

function parseClipboardText(plainText) {
  // Remove object replacement characters (from inline images in clipboard)
  plainText = plainText.replace(/￼/g, '');
  // Remove extra blank lines (collapse 3+ blank lines to 2)
  plainText = plainText.replace(/\n{3,}/g, '\n\n');

  const processed = preprocessPrice(plainText);
  const blocks = splitBlocks(processed);
  if (blocks.length === 0) return [];

  return blocks.map((block, i) => {
    const parsed = parseItemBlock(block);
    const category = matchCategory(parsed.name, parsed.spec);
    return {
      id: i + 1,
      shopName: block.shop,
      name: parsed.name,
      spec: parsed.spec,
      price: parsed.price,
      quantity: parsed.quantity,
      link: '',
      category: category,
      location: 'Online',
      confidence: parsed.price !== null && parsed.name.length > 5,
    };
  }).slice(0, 30);
}

// === LINK EXTRACTION ===

function extractLinksFromHTML(html) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(html, 'text/html');
  const links = [];
  doc.querySelectorAll('a[href]').forEach(a => {
    const href = a.getAttribute('href');
    if (href && (href.includes('item.taobao.com') || href.includes('item.htm') || href.includes('detail.tmall.com'))) {
      links.push(href);
    }
  });
  return links;
}

function assignLinks(items, links) {
  for (let i = 0; i < Math.min(items.length, links.length); i++) {
    items[i].link = links[i];
  }
  return items;
}

// === STATE ===
let items = [];

// === DOM refs ===
const pasteZone = document.getElementById('paste-zone');
const pasteInput = document.getElementById('paste-input');
const resultBar = document.getElementById('result-bar');

// Bind restart button
document.getElementById('btn-restart').addEventListener('click', clearAll);

// === PASTE HANDLER ===
pasteInput.addEventListener('paste', function(e) {
  e.preventDefault();
  const plainText = e.clipboardData.getData('text/plain');
  const html = e.clipboardData.getData('text/html');

  if (!plainText || plainText.trim().length === 0) {
    showError('请先复制购物车内容 (Ctrl+A → Ctrl+C)');
    return;
  }

  items = parseClipboardText(plainText);

  if (items.length === 0) {
    showError('未识别到商品，请确认是从购物车复制的内容');
    return;
  }

  if (html) {
    const links = extractLinksFromHTML(html);
    items = assignLinks(items, links);
  }

  const totalPrice = items.reduce((sum, i) => sum + (i.price || 0) * (i.quantity || 1), 0);
  resultBar.innerHTML = `
    <span class="count">已识别 ${items.length} 个商品 | 总计 ¥${totalPrice.toFixed(2)}</span>
    <div>
      <button onclick="clearAll()">重新开始</button>
      <button onclick="showEditor()" style="margin-left:8px; background:#4a90d9; color:#fff; border-color:#4a90d9;">编辑确认</button>
    </div>`;
  resultBar.style.display = 'flex';
  resultBar.style.background = '#e8f5e9';
  pasteZone.style.display = 'none';
  pasteInput.value = '';

  renderEditor();
});

function showError(msg) {
  resultBar.innerHTML = `<span style="color:#c62828;">⚠ ${msg}</span>`;
  resultBar.style.display = 'flex';
  resultBar.style.background = '#ffebee';
}

function clearAll() {
  items = [];
  pasteZone.style.display = 'block';
  pasteInput.value = '';
  resultBar.style.display = 'none';
  editorArea.style.display = 'none';
  outputArea.style.display = 'none';
  if (document.getElementById('table-container')) {
    document.getElementById('table-container').innerHTML = '';
  }
}

function showEditor() {
  editorArea.scrollIntoView({ behavior: 'smooth' });
}

const editorArea = document.getElementById('editor-area');
const outputArea = document.getElementById('output-area');

const CATEGORIES = [
  "EE_Motor/ESC related", "EE_Electronic Sensor", "EE_Battery", "EE_PCB",
  "EE_Components", "EE_Miscellaneous",
  "MECH_Metal parts/manufacture", "MECH_Fibre parts/manufacture",
  "MECH_Pneumatic related", "MECH_3D printing related",
  "MECH_Components", "MECH_Miscellaneous",
  "SW_MCU related", "SW_Sensors", "SW_Miscellaneous",
  "Props", "Others"
];

// Style IDs extracted from template Row 11
var COL_STYLES = { A:30, B:31, C:32, D:31, E:33, F:34, G:30, H:35, I:36, J:37, K:38 };

function cellXML(col, row, value, isNumber) {
  var ref = col + row;
  var style = COL_STYLES[col];
  if (isNumber && value !== null && value !== undefined && value !== '') {
    return '<c r="' + ref + '" s="' + style + '"><v>' + value + '</v></c>';
  } else if (value !== null && value !== undefined && value !== '') {
    var escaped = String(value)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
    return '<c r="' + ref + '" s="' + style + '" t="inlineStr"><is><t>' + escaped + '</t></is></c>';
  } else {
    return '<c r="' + ref + '" s="' + style + '"/>';
  }
}

function exportExcel() {
  if (items.length === 0) {
    alert('没有商品数据可导出');
    return;
  }

  try {
    var today = new Date();
    var dateStr = (today.getMonth()+1) + '/' + today.getDate() + '/' + today.getFullYear();

    // Decode Base64 template
    var binaryStr = atob(TEMPLATE_B64);
    var bytes = new Uint8Array(binaryStr.length);
    for (var i = 0; i < binaryStr.length; i++) {
      bytes[i] = binaryStr.charCodeAt(i);
    }

    JSZip.loadAsync(bytes).then(function(zip) {
      // Read and modify sheet1.xml
      return zip.file('xl/worksheets/sheet1.xml').async('string').then(function(sheetXML) {
        // Generate new rows for ALL 30 slots (rows 11-40), preserving template format
        var newRows = '';
        for (var r = 11; r <= 40; r++) {
          var idx = r - 11;
          var item = idx < items.length ? items[idx] : null;

          newRows += '<row r="' + r + '" ht="20.25" customHeight="1">';

          if (item) {
            var displayName = item.spec
              ? item.name + ' (' + item.spec + ')'
              : item.name;
            var price = item.price !== null ? item.price : 0;

            newRows += cellXML('A', r, idx + 1, true);
            newRows += cellXML('B', r, dateStr, false);
            newRows += cellXML('C', r, displayName, false);
            newRows += cellXML('D', r, item.location || 'Online', false);
            newRows += cellXML('E', r, item.link || '', false);
            newRows += cellXML('F', r, item.quantity, true);
            newRows += cellXML('G', r, item.category || 'Others', false);
            newRows += cellXML('H', r, price * item.quantity, true);
            newRows += cellXML('I', r, 0, true);
            newRows += cellXML('J', r, 0, true);
            newRows += cellXML('K', r, 'Pending Approval', false);
          } else {
            newRows += cellXML('A', r, '', false);
            newRows += cellXML('B', r, '', false);
            newRows += cellXML('C', r, '', false);
            newRows += cellXML('D', r, '', false);
            newRows += cellXML('E', r, '', false);
            newRows += cellXML('F', r, '', false);
            newRows += cellXML('G', r, '', false);
            newRows += cellXML('H', r, '', false);
            newRows += cellXML('I', r, '', false);
            newRows += cellXML('J', r, '', false);
            newRows += cellXML('K', r, 'Pending Approval', false);
          }

          newRows += '</row>';
        }

        // Replace rows 11-40 by finding their exact positions in the XML
        var row11Start = sheetXML.indexOf('<row r="11"');
        var row41Start = sheetXML.indexOf('<row r="41"');
        if (row11Start >= 0 && row41Start >= 0) {
          sheetXML = sheetXML.substring(0, row11Start) + newRows + sheetXML.substring(row41Start);
        }

        // Get Competition and Student Name from inputs
        var competitionName = document.getElementById('input-competition').value.trim();
        var studentName = document.getElementById('input-student').value.trim();

        // Inject Competition name into cell B3
        if (competitionName) {
          var cellB3 = cellXML('B', 3, competitionName, false);
          sheetXML = sheetXML.replace(/<c r="B3"[^/]*\/>/, '');
          sheetXML = sheetXML.replace(/<c r="B3"[^>]*>.*?<\/c>/, '');
          sheetXML = sheetXML.replace(/(<row r="3"[^>]*>)/, '$1' + cellB3);
        }

        // Inject Student Name into cell H66
        if (studentName) {
          var cellH66 = cellXML('H', 66, studentName, false);
          sheetXML = sheetXML.replace(/<c r="H66"[^/]*\/>/, '');
          sheetXML = sheetXML.replace(/<c r="H66"[^>]*>.*?<\/c>/, '');
          sheetXML = sheetXML.replace(/(<row r="66"[^>]*>)/, '$1' + cellH66);
        }

        // Update the zip
        zip.file('xl/worksheets/sheet1.xml', sheetXML);

        // Generate new xlsx
        return zip.generateAsync({ type: 'blob', compression: 'DEFLATE' });
      });
    }).then(function(blob) {
      var filename = 'OrderForm_' + today.getFullYear() + String(today.getMonth()+1).padStart(2,'0') + String(today.getDate()).padStart(2,'0') + '.xlsx';
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }).catch(function(err) {
      console.error('Export failed:', err);
      alert('导出失败，请重试。如果持续失败，可以手动复制表格数据。');
    });
  } catch (err) {
    console.error('Export failed:', err);
    alert('导出失败，请重试。');
  }
}

function renderEditor() {
  editorArea.style.display = 'block';
  outputArea.style.display = 'block';

  var html = '<table class="edit-table"><thead><tr>';
  html += '<th class="col-num">#</th>';
  html += '<th class="col-name">Item Name</th>';
  html += '<th class="col-qty">QTY</th>';
  html += '<th class="col-price">¥</th>';
  html += '<th class="col-type">Type</th>';
  html += '<th class="col-link">Link</th>';
  html += '<th class="col-del"></th>';
  html += '</tr></thead><tbody>';

  items.forEach(function(item, idx) {
    var displayName = item.spec
      ? (item.name + ' (' + item.spec + ')')
      : item.name;
    var priceClass = item.price === null ? 'low-confidence' : '';
    var categoryOptions = CATEGORIES.map(function(c) {
      return '<option value="' + c + '"' + (c === item.category ? ' selected' : '') + '>' + c + '</option>';
    }).join('');

    html += '<tr data-idx="' + idx + '">';
    html += '<td class="col-num">' + (idx + 1) + '</td>';
    html += '<td><input type="text" value="' + escAttr(displayName) + '" class="col-name-input" data-field="displayName"></td>';
    html += '<td class="col-qty"><input type="number" value="' + item.quantity + '" min="1" data-field="quantity"></td>';
    html += '<td class="col-price"><input type="text" value="' + (item.price !== null ? item.price : '') + '" class="' + priceClass + '" data-field="price"></td>';
    html += '<td class="col-type"><select data-field="category">' + categoryOptions + '</select></td>';
    html += '<td class="col-link"><input type="text" value="' + escAttr(item.link) + '" placeholder="粘贴链接" data-field="link"></td>';
    html += '<td class="col-del"><button class="btn-del" onclick="deleteItem(' + idx + ')" title="删除">&times;</button></td>';
    html += '</tr>';
  });

  html += '</tbody></table>';
  document.getElementById('table-container').innerHTML = html;

  document.querySelectorAll('.edit-table [data-field]').forEach(function(el) {
    el.addEventListener('change', function() {
      var row = this.closest('tr');
      var idx = parseInt(row.dataset.idx);
      var field = this.dataset.field;
      var value = this.value;

      if (field === 'quantity') { value = parseInt(value) || 1; }
      if (field === 'price') { value = parseFloat(value) || null; }
      if (field === 'displayName') {
        var m = value.match(/^(.+?)\s*\((.+)\)$/);
        if (m) { items[idx].name = m[1]; items[idx].spec = m[2]; }
        else { items[idx].name = value; items[idx].spec = ''; }
        return;
      }

      items[idx][field] = value;
    });
  });

  updateSummary();
}

function escAttr(str) {
  return String(str).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function deleteItem(idx) {
  items.splice(idx, 1);
  items.forEach(function(item, i) { item.id = i + 1; });
  if (items.length === 0) {
    clearAll();
    return;
  }
  renderEditor();
}

function updateSummary() {
  var total = items.reduce(function(sum, i) { return sum + (i.price || 0) * (i.quantity || 1); }, 0);
  document.getElementById('summary-bar').innerHTML =
    '<span>总计: ¥' + total.toFixed(2) + ' | ' + items.length + ' 个商品</span>' +
    '<button id="btn-export" style="padding:10px 24px; background:#2e7d32; color:#fff; border:none; border-radius:4px; font-size:15px; cursor:pointer;">导出 Excel</button>';
  document.getElementById('btn-export').addEventListener('click', exportExcel);
}

</script>
</body>
</html>
